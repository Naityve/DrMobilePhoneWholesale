<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-main-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 2rem; }
        .admin-main-tab { padding: 0.8rem 1.8rem; font-size: 0.95rem; font-weight: 500; color: var(--gray-500); cursor: pointer; border: none; background: transparent; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .admin-main-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
        .admin-main-tab:hover { color: var(--black); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .product-form-card { background: white; border: 1px solid var(--gray-200); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
        .product-form-card h2 { font-family: 'Instrument Serif', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 1.5rem; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; color: var(--black); background: white; outline: none; resize: vertical; min-height: 80px; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-group textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }
        .form-group select { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; color: var(--black); background: white; outline: none; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-group select:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }
        .toggle-row { display: flex; gap: 2rem; align-items: center; margin-bottom: 1.25rem; }
        .toggle-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-weight: 500; color: var(--gray-700); }
        .toggle-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--orange); cursor: pointer; }

        .image-upload-area { border: 2px dashed var(--gray-200); border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 1.25rem; }
        .image-upload-area:hover { border-color: var(--orange); background: var(--orange-dim); }
        .image-upload-area.has-image { padding: 0.5rem; }
        .image-upload-area img { max-height: 150px; border-radius: 8px; }
        .image-upload-area p { color: var(--gray-500); font-size: 0.85rem; }
        .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
        .form-actions .btn { width: auto; }

        .product-admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .product-admin-card { border: 1px solid var(--gray-200); border-radius: 14px; overflow: hidden; background: white; transition: box-shadow 0.2s; }
        .product-admin-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .product-admin-card img { width: 100%; height: 180px; object-fit: cover; background: var(--gray-100); }
        .product-admin-card .no-image { width: 100%; height: 180px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; color: var(--gray-300); font-size: 2.5rem; }
        .product-admin-info { padding: 1.2rem; }
        .product-admin-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .product-admin-info .category-tag { font-size: 0.75rem; color: var(--orange); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .product-admin-info .price-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.6rem 0; }
        .product-admin-info .price { font-weight: 700; font-size: 1.1rem; }
        .product-admin-info .sale-price { color: var(--orange); }
        .product-admin-info .original-price { text-decoration: line-through; color: var(--gray-500); font-size: 0.88rem; }
        .product-admin-info .meta { font-size: 0.8rem; color: var(--gray-500); margin-bottom: 0.8rem; }
        .product-admin-info .badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
        .product-admin-info .badge-sm { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 100px; font-weight: 500; }
        .badge-featured { background: #EEF2FF; color: #4F46E5; }
        .badge-sale { background: #FEF3C7; color: #92400E; }
        .badge-inactive { background: var(--red-dim); color: var(--red); }
        .product-admin-info .card-actions { display: flex; gap: 0.5rem; }

        @media (max-width: 768px) {
            .form-grid-3 { grid-template-columns: 1fr; }
            .form-grid-2 { grid-template-columns: 1fr; }
            .toggle-row { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .product-admin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg>
            </div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/store.html">Store</a>
            <a href="/admin.html" style="color: var(--orange);">Admin</a>
            <a href="#" onclick="signOut(); return false;" class="nav-cta">Sign Out</a>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="admin-wrapper" style="max-width: 1100px;">
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Manage users and products.</p>
        <div id="alert" class="alert"></div>

        <div class="admin-main-tabs">
            <button class="admin-main-tab active" onclick="switchMainTab('users', this)">Users</button>
            <button class="admin-main-tab" onclick="switchMainTab('products', this)">Products</button>
            <button class="admin-main-tab" onclick="switchMainTab('orders', this)">Orders</button>
        </div>

        <!-- USERS PANEL -->
        <div id="panel-users" class="tab-panel active">
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="filterUsers('pending', this)">Pending <span class="count" id="pendingCount">0</span></button>
                <button class="admin-tab" onclick="filterUsers('approved', this)">Approved</button>
                <button class="admin-tab" onclick="filterUsers('rejected', this)">Rejected</button>
                <button class="admin-tab" onclick="filterUsers('all', this)">All</button>
            </div>
            <div class="user-table">
                <table>
                    <thead><tr><th>Business</th><th>Contact</th><th>Email</th><th>Phone</th><th>Status</th><th>Registered</th><th>Actions</th></tr></thead>
                    <tbody id="usersTableBody"><tr><td colspan="7" class="empty-state">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- PRODUCTS PANEL -->
        <div id="panel-products" class="tab-panel">
            <div class="product-form-card" id="productFormCard">
                <h2 id="formTitle">Add New Product</h2>
                <form id="productForm">
                    <input type="hidden" id="editProductId" value="">
                    <div class="form-grid-2" style="margin-bottom:1rem;">
                        <div class="form-group">
                            <label for="prodName">Product Name *</label>
                            <input type="text" id="prodName" placeholder="e.g. USB-C Fast Charging Cable" required>
                        </div>
                        <div class="form-group">
                            <label for="prodCategory">Category *</label>
                            <select id="prodCategory" required>
                                <option value="">Select category...</option>
                                <option value="Cables & Chargers">Cables & Chargers</option>
                                <option value="Earbuds & Audio">Earbuds & Audio</option>
                                <option value="Phone Accessories">Phone Accessories</option>
                                <option value="Power & Plugs">Power & Plugs</option>
                                <option value="Smart & LED">Smart & LED</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="prodDesc">Description</label>
                        <textarea id="prodDesc" placeholder="Short description of the product..."></textarea>
                    </div>
                    <div class="form-grid-3">
                        <div class="form-group">
                            <label for="prodPrice">Wholesale Price (€) *</label>
                            <input type="number" id="prodPrice" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="prodRetailPrice">Retail Price (€)</label>
                            <input type="number" id="prodRetailPrice" placeholder="Consumer price" step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label for="prodSalePrice">Sale Price (€)</label>
                            <input type="number" id="prodSalePrice" placeholder="Leave blank if none" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="form-grid-3">
                        <div class="form-group">
                            <label for="prodStock">Stock Quantity *</label>
                            <input type="number" id="prodStock" placeholder="0" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="prodSku">SKU</label>
                            <input type="text" id="prodSku" placeholder="e.g. USBC-FC-1M">
                        </div>
                        <div class="form-group"></div>
                    </div>
                    <label style="font-size:0.82rem;font-weight:500;color:var(--gray-700);margin-bottom:0.4rem;display:block;">Product Image</label>
                    <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('prodImage').click()">
                        <div id="imagePreview">
                            <p>📷 Click to upload an image</p>
                            <p style="font-size:0.78rem;color:var(--gray-300);">JPG, PNG, WebP — max 5MB</p>
                        </div>
                        <input type="file" id="prodImage" accept="image/jpeg,image/png,image/webp" onchange="handleImageSelect(event)" style="display:none">
                    </div>
                    <div class="toggle-row">
                        <label class="toggle-item"><input type="checkbox" id="prodFeatured"> Featured product</label>
                        <label class="toggle-item"><input type="checkbox" id="prodOnSale"> On sale</label>
                        <label class="toggle-item"><input type="checkbox" id="prodActive" checked> Active (visible in store)</label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-sm" id="productSubmitBtn">Add Product</button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="resetProductForm()" style="display:none;" id="cancelEditBtn">Cancel</button>
                    </div>
                </form>
            </div>
            <div id="productsGrid" class="product-admin-grid">
                <div class="empty-state" style="grid-column:1/-1;">Loading products...</div>
            </div>
        </div>

        <!-- ORDERS PANEL -->
        <div id="panel-orders" class="tab-panel">
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="filterOrders('all', this)">All</button>
                <button class="admin-tab" onclick="filterOrders('pending', this)">Pending</button>
                <button class="admin-tab" onclick="filterOrders('paid', this)">Paid</button>
                <button class="admin-tab" onclick="filterOrders('invoiced', this)">Invoiced</button>
                <button class="admin-tab" onclick="filterOrders('shipped', this)">Shipped</button>
                <button class="admin-tab" onclick="filterOrders('completed', this)">Completed</button>
            </div>
            <div class="user-table">
                <table>
                    <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody id="ordersTableBody"><tr><td colspan="8" class="empty-state">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        let allUsers = [], allProducts = [], currentFilter = 'pending', selectedImageFile = null;

        (async () => {
            const result = await requireAdmin();
            if (!result) return;
            await loadUsers();
            await loadProducts();
            await loadOrders();
        })();

        function switchMainTab(tab, el) {
            document.querySelectorAll('.admin-main-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            hideAlert('alert');
        }

        // ── USERS ──
        async function loadUsers() {
            const { data, error } = await db.from('profiles').select('*').order('created_at', { ascending: false });
            if (error) { showAlert('alert', 'Failed to load users: ' + error.message, 'error'); return; }
            allUsers = data || [];
            document.getElementById('pendingCount').textContent = allUsers.filter(u => u.status === 'pending').length;
            renderUsers();
        }

        function filterUsers(status, tabEl) {
            currentFilter = status;
            document.querySelectorAll('.admin-tabs .admin-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            renderUsers();
        }

        function renderUsers() {
            const tbody = document.getElementById('usersTableBody');
            const filtered = currentFilter === 'all' ? allUsers : allUsers.filter(u => u.status === currentFilter);
            if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No ${currentFilter === 'all' ? '' : currentFilter} users.</td></tr>`; return; }
            tbody.innerHTML = filtered.map(user => `<tr>
                <td><strong>${esc(user.business_name)}</strong></td>
                <td>${esc(user.contact_name)}</td><td>${esc(user.email)}</td><td>${esc(user.phone || '—')}</td>
                <td><span class="status-badge status-${user.status}">${cap(user.status)}</span></td>
                <td>${fmtDate(user.created_at)}</td>
                <td class="actions">
                    ${user.status !== 'approved' ? `<button class="btn btn-sm btn-approve" onclick="updateStatus('${user.id}','approved')">Approve</button>` : ''}
                    ${user.status !== 'rejected' ? `<button class="btn btn-sm btn-reject" onclick="updateStatus('${user.id}','rejected')">Reject</button>` : ''}
                </td></tr>`).join('');
        }

        async function updateStatus(userId, newStatus) {
            const { error } = await db.from('profiles').update({ status: newStatus }).eq('id', userId);
            if (error) { showAlert('alert', 'Failed: ' + error.message, 'error'); return; }
            showAlert('alert', `User ${newStatus}.`, 'success');
            await loadUsers();
        }

        // ── PRODUCTS ──
        async function loadProducts() {
            const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
            if (error) { showAlert('alert', 'Failed to load products: ' + error.message, 'error'); return; }
            allProducts = data || [];
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if (allProducts.length === 0) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No products yet. Add your first product above.</div>'; return; }
            grid.innerHTML = allProducts.map(p => {
                const hasImg = p.image_url && p.image_url.length > 0;
                const hasSale = p.is_on_sale && p.sale_price;
                let badges = '';
                if (p.is_featured) badges += '<span class="badge-sm badge-featured">Featured</span>';
                if (p.is_on_sale) badges += '<span class="badge-sm badge-sale">On Sale</span>';
                if (!p.is_active) badges += '<span class="badge-sm badge-inactive">Inactive</span>';
                return `<div class="product-admin-card">
                    ${hasImg ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}">` : `<div class="no-image">📦</div>`}
                    <div class="product-admin-info">
                        <div class="category-tag">${esc(p.category)}</div>
                        <h3>${esc(p.name)}</h3>
                        <div class="price-row">${hasSale
                            ? `<span class="price sale-price">€${Number(p.sale_price).toFixed(2)}</span><span class="original-price">€${Number(p.price).toFixed(2)}</span>`
                            : `<span class="price">€${Number(p.price).toFixed(2)}</span>`}${p.retail_price ? ` <span style="font-size:0.78rem;color:var(--gray-500);">Retail: €${Number(p.retail_price).toFixed(2)}</span>` : ''}</div>
                        <div class="meta">SKU: ${esc(p.sku || '—')} · Stock: ${p.stock_quantity}</div>
                        ${badges ? `<div class="badges">${badges}</div>` : ''}
                        <div class="card-actions">
                            <button class="btn btn-sm btn-secondary" onclick="editProduct('${p.id}')">Edit</button>
                            <button class="btn btn-sm btn-reject" onclick="deleteProduct('${p.id}','${esc(p.name).replace(/'/g,"\\'")}')">Delete</button>
                        </div>
                    </div></div>`;
            }).join('');
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { showAlert('alert', 'Image must be under 5MB.', 'error'); return; }
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                document.getElementById('imageUploadArea').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        async function uploadImage(file) {
            const ext = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${ext}`;
            const { data, error } = await db.storage.from('product-images').upload(fileName, file);
            if (error) throw error;
            const { data: urlData } = db.storage.from('product-images').getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('alert');
            const btn = document.getElementById('productSubmitBtn');
            setLoading(btn, true);
            try {
                let imageUrl = '';
                const editId = document.getElementById('editProductId').value;
                if (selectedImageFile) {
                    imageUrl = await uploadImage(selectedImageFile);
                } else if (editId) {
                    const existing = allProducts.find(p => p.id === editId);
                    imageUrl = existing?.image_url || '';
                }
                const productData = {
                    name: document.getElementById('prodName').value.trim(),
                    description: document.getElementById('prodDesc').value.trim(),
                    price: parseFloat(document.getElementById('prodPrice').value),
                    retail_price: document.getElementById('prodRetailPrice').value ? parseFloat(document.getElementById('prodRetailPrice').value) : null,
                    sale_price: document.getElementById('prodSalePrice').value ? parseFloat(document.getElementById('prodSalePrice').value) : null,
                    category: document.getElementById('prodCategory').value,
                    sku: document.getElementById('prodSku').value.trim(),
                    stock_quantity: parseInt(document.getElementById('prodStock').value) || 0,
                    image_url: imageUrl,
                    is_featured: document.getElementById('prodFeatured').checked,
                    is_on_sale: document.getElementById('prodOnSale').checked,
                    is_active: document.getElementById('prodActive').checked
                };
                let error;
                if (editId) {
                    ({ error } = await db.from('products').update(productData).eq('id', editId));
                } else {
                    ({ error } = await db.from('products').insert(productData));
                }
                if (error) { showAlert('alert', 'Failed to save: ' + error.message, 'error'); setLoading(btn, false); return; }
                showAlert('alert', editId ? 'Product updated!' : 'Product added!', 'success');
                resetProductForm();
                await loadProducts();
            } catch (err) {
                showAlert('alert', 'Error: ' + err.message, 'error');
            }
            setLoading(btn, false);
        });

        function editProduct(productId) {
            const p = allProducts.find(x => x.id === productId);
            if (!p) return;
            document.getElementById('editProductId').value = p.id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodRetailPrice').value = p.retail_price || '';
            document.getElementById('prodSalePrice').value = p.sale_price || '';
            document.getElementById('prodCategory').value = p.category;
            document.getElementById('prodSku').value = p.sku || '';
            document.getElementById('prodStock').value = p.stock_quantity;
            document.getElementById('prodFeatured').checked = p.is_featured;
            document.getElementById('prodOnSale').checked = p.is_on_sale;
            document.getElementById('prodActive').checked = p.is_active;
            if (p.image_url) {
                document.getElementById('imagePreview').innerHTML = `<img src="${p.image_url}" alt="Current">`;
                document.getElementById('imageUploadArea').classList.add('has-image');
            }
            document.getElementById('formTitle').textContent = 'Edit Product';
            document.getElementById('productSubmitBtn').textContent = 'Save Changes';
            document.getElementById('cancelEditBtn').style.display = '';
            document.getElementById('productFormCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function deleteProduct(productId, name) {
            if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
            const { error } = await db.from('products').delete().eq('id', productId);
            if (error) { showAlert('alert', 'Failed to delete: ' + error.message, 'error'); return; }
            showAlert('alert', 'Product deleted.', 'success');
            await loadProducts();
        }

        function resetProductForm() {
            document.getElementById('productForm').reset();
            document.getElementById('editProductId').value = '';
            document.getElementById('prodActive').checked = true;
            document.getElementById('formTitle').textContent = 'Add New Product';
            document.getElementById('productSubmitBtn').textContent = 'Add Product';
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('imagePreview').innerHTML = '<p>📷 Click to upload an image</p><p style="font-size:0.78rem;color:var(--gray-300);">JPG, PNG, WebP — max 5MB</p>';
            document.getElementById('imageUploadArea').classList.remove('has-image');
            selectedImageFile = null;
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
        function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
        function fmtDate(d) { return new Date(d).toLocaleDateString('en-IE', { day: 'numeric', month: 'short', year: 'numeric' }); }

        // ── ORDERS ──
        let allOrders = [], currentOrderFilter = 'all', allInvoices = {};

        async function loadOrders() {
            const { data, error } = await db
                .from('orders')
                .select('*, order_items(*)')
                .order('created_at', { ascending: false });

            if (error) { showAlert('alert', 'Failed to load orders: ' + error.message, 'error'); return; }

            const userIds = [...new Set((data || []).map(o => o.user_id))];
            let profileMap = {};
            if (userIds.length > 0) {
                const { data: profiles } = await db.from('profiles').select('id, business_name, contact_name, email, phone').in('id', userIds);
                (profiles || []).forEach(p => profileMap[p.id] = p);
            }

            // Load all invoices
            const orderIds = (data || []).map(o => o.id);
            if (orderIds.length > 0) {
                const { data: invoices } = await db.from('invoices').select('*').in('order_id', orderIds);
                (invoices || []).forEach(inv => allInvoices[inv.order_id] = inv);
            }

            allOrders = (data || []).map(o => ({ ...o, profiles: profileMap[o.user_id] || {}, invoice: allInvoices[o.id] || null }));
            renderOrders();
        }

        function filterOrders(status, tabEl) {
            currentOrderFilter = status;
            document.querySelectorAll('#panel-orders .admin-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            renderOrders();
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            const filtered = currentOrderFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentOrderFilter);

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty-state">No ${currentOrderFilter === 'all' ? '' : currentOrderFilter} orders.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(order => {
                const items = order.order_items || [];
                const itemSummary = items.map(i => i.quantity + '× ' + esc(i.product_name)).join(', ');
                const profile = order.profiles || {};
                const statusMap = { pending: 'pending', paid: 'approved', invoiced: 'pending', shipped: 'approved', completed: 'approved', cancelled: 'rejected' };
                const statusActions = [];
                if (order.status === 'pending') statusActions.push('paid');
                if (order.status === 'paid' || order.status === 'invoiced') statusActions.push('shipped');
                if (order.status === 'shipped') statusActions.push('completed');
                if (order.status !== 'cancelled' && order.status !== 'completed') statusActions.push('cancelled');

                return `<tr>
                    <td><strong>#${order.id.slice(0, 8).toUpperCase()}</strong></td>
                    <td>${esc(profile.business_name || '—')}<br><span style="font-size:0.78rem;color:var(--gray-500);">${esc(profile.email || '')}</span></td>
                    <td style="font-size:0.82rem;max-width:200px;">${itemSummary || '—'}</td>
                    <td><strong>€${Number(order.total).toFixed(2)}</strong></td>
                    <td>${order.payment_method ? cap(order.payment_method) : '—'}</td>
                    <td><span class="status-badge status-${statusMap[order.status] || 'pending'}">${cap(order.status)}</span></td>
                    <td>${fmtDate(order.created_at)}</td>
                    <td class="actions" style="min-width:200px;">
                        <button class="btn btn-sm btn-secondary" onclick="viewAdminOrder('${order.id}')" style="margin-right:0.25rem;">View</button>
                        <select onchange="updateOrderStatus('${order.id}', this.value); this.value='';" style="padding:0.4rem;border-radius:6px;border:1px solid var(--gray-200);font-size:0.78rem;font-family:'DM Sans',sans-serif;">
                            <option value="">Update...</option>
                            ${statusActions.map(s => `<option value="${s}">${cap(s)}</option>`).join('')}
                        </select>
                    </td>
                </tr>`;
            }).join('');
        }

        async function updateOrderStatus(orderId, newStatus) {
            if (!newStatus) return;
            const { error } = await db.from('orders').update({ status: newStatus }).eq('id', orderId);
            if (error) { showAlert('alert', 'Failed: ' + error.message, 'error'); return; }
            showAlert('alert', `Order updated to ${newStatus}.`, 'success');
            await loadOrders();
        }

        function viewAdminOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            const items = order.order_items || [];
            const profile = order.profiles || {};
            const invoice = order.invoice;
            const subtotal = items.reduce((s, i) => s + (Number(i.unit_price) * i.quantity), 0);
            const isInvoice = order.payment_method === 'invoice';
            const docTitle = isInvoice && invoice ? 'Invoice' : 'Order';
            const docNumber = isInvoice && invoice ? invoice.invoice_number : '#' + order.id.slice(0, 8).toUpperCase();

            const panel = document.getElementById('panel-orders');
            panel.innerHTML = `
                <div class="back-link" onclick="restoreOrdersPanel()" style="display:inline-flex;align-items:center;gap:0.4rem;font-size:0.88rem;color:var(--gray-500);cursor:pointer;margin-bottom:1rem;">← Back to Orders</div>
                <div style="margin-bottom:1rem;"><button class="btn btn-secondary btn-sm" onclick="printOrder()">🖨 Print ${docTitle}</button></div>
                <div class="admin-print-doc" id="adminPrintDoc" style="background:white;border:1px solid var(--gray-200);border-radius:14px;padding:2rem;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:2px solid var(--black);">
                        <div>
                            <h2 style="font-family:'Instrument Serif',serif;font-size:1.5rem;font-weight:400;margin-bottom:0.2rem;">DrMobile<span style="color:var(--orange);">Phone</span></h2>
                            <p style="font-size:0.8rem;color:var(--gray-500);line-height:1.5;">Wholesale Consumer Electronics<br>Dublin, Ireland<br>info@drmobilephone.ie<br>+353 089 989 9550</p>
                        </div>
                        <div style="text-align:right;">
                            <h1 style="font-family:'Instrument Serif',serif;font-size:1.8rem;font-weight:400;margin-bottom:0.3rem;">${docTitle}</h1>
                            <p style="font-size:0.85rem;color:var(--gray-500);"><strong>${docNumber}</strong><br>Date: ${fmtDate(order.created_at)}${isInvoice && invoice ? '<br>Due: ' + fmtDate(invoice.due_date) + '<br>Status: ' + cap(invoice.status) : ''}</p>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem;">
                        <div>
                            <label style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;color:var(--gray-500);display:block;margin-bottom:0.3rem;">Customer</label>
                            <p style="font-size:0.88rem;line-height:1.5;"><strong>${esc(profile.business_name || '—')}</strong><br>${esc(profile.contact_name || '')}<br>${esc(profile.email || '')}<br>${esc(profile.phone || '')}</p>
                        </div>
                        <div>
                            <label style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;color:var(--gray-500);display:block;margin-bottom:0.3rem;">Order Details</label>
                            <p style="font-size:0.88rem;line-height:1.5;">Order #${order.id.slice(0, 8).toUpperCase()}<br>Status: ${cap(order.status)}<br>Payment: ${order.payment_method === 'invoice' ? 'Trade Account (Invoice)' : 'Card'}</p>
                        </div>
                    </div>
                    <table style="width:100%;border-collapse:collapse;margin-bottom:1.5rem;">
                        <thead>
                            <tr>
                                <th style="text-align:left;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);font-weight:600;padding:0.6rem 0.8rem;border-bottom:2px solid var(--gray-200);">#</th>
                                <th style="text-align:left;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);font-weight:600;padding:0.6rem 0.8rem;border-bottom:2px solid var(--gray-200);">Product</th>
                                <th style="text-align:right;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);font-weight:600;padding:0.6rem 0.8rem;border-bottom:2px solid var(--gray-200);">Qty</th>
                                <th style="text-align:right;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);font-weight:600;padding:0.6rem 0.8rem;border-bottom:2px solid var(--gray-200);">Unit Price</th>
                                <th style="text-align:right;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);font-weight:600;padding:0.6rem 0.8rem;border-bottom:2px solid var(--gray-200);">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map((item, i) => `<tr>
                                <td style="padding:0.7rem 0.8rem;font-size:0.88rem;border-bottom:1px solid var(--gray-100);">${i + 1}</td>
                                <td style="padding:0.7rem 0.8rem;font-size:0.88rem;border-bottom:1px solid var(--gray-100);font-weight:500;">${esc(item.product_name)}</td>
                                <td style="padding:0.7rem 0.8rem;font-size:0.88rem;border-bottom:1px solid var(--gray-100);text-align:right;">${item.quantity}</td>
                                <td style="padding:0.7rem 0.8rem;font-size:0.88rem;border-bottom:1px solid var(--gray-100);text-align:right;">€${Number(item.unit_price).toFixed(2)}</td>
                                <td style="padding:0.7rem 0.8rem;font-size:0.88rem;border-bottom:1px solid var(--gray-100);text-align:right;">€${(Number(item.unit_price) * item.quantity).toFixed(2)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                    <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
                        <div style="width:260px;">
                            <div style="display:flex;justify-content:space-between;padding:0.4rem 0;font-size:0.9rem;"><span>Subtotal</span><span>€${subtotal.toFixed(2)}</span></div>
                            <div style="display:flex;justify-content:space-between;padding:0.6rem 0 0.4rem;font-size:1.1rem;font-weight:700;border-top:2px solid var(--black);margin-top:0.3rem;"><span>Total</span><span>€${Number(order.total).toFixed(2)}</span></div>
                        </div>
                    </div>
                    ${order.notes ? `<div style="background:var(--gray-50);border-radius:8px;padding:1rem;"><label style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);font-weight:600;display:block;margin-bottom:0.3rem;">Notes</label><p style="font-size:0.85rem;color:var(--gray-700);">${esc(order.notes)}</p></div>` : ''}
                </div>`;
        }

        function printOrder() {
            const doc = document.getElementById('adminPrintDoc');
            const win = window.open('', '_blank');
            win.document.write('<html><head><title>Print Order</title>');
            win.document.write('<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&family=Instrument+Serif&display=swap" rel="stylesheet">');
            win.document.write('<style>body{font-family:"DM Sans",sans-serif;padding:20mm;color:#0A0A0A;} table{width:100%;border-collapse:collapse;} th,td{padding:0.6rem 0.8rem;} th{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:#8A8A8A;font-weight:600;border-bottom:2px solid #E0E0E0;text-align:left;} td{font-size:0.88rem;border-bottom:1px solid #F2F2F2;} .right{text-align:right;}</style>');
            win.document.write('</head><body>');
            win.document.write(doc.innerHTML);
            win.document.write('</body></html>');
            win.document.close();
            win.onload = () => { win.print(); };
        }

        function restoreOrdersPanel() {
            const panel = document.getElementById('panel-orders');
            panel.innerHTML = `
                <div class="admin-tabs">
                    <button class="admin-tab active" onclick="filterOrders('all', this)">All</button>
                    <button class="admin-tab" onclick="filterOrders('pending', this)">Pending</button>
                    <button class="admin-tab" onclick="filterOrders('paid', this)">Paid</button>
                    <button class="admin-tab" onclick="filterOrders('invoiced', this)">Invoiced</button>
                    <button class="admin-tab" onclick="filterOrders('shipped', this)">Shipped</button>
                    <button class="admin-tab" onclick="filterOrders('completed', this)">Completed</button>
                </div>
                <div class="user-table">
                    <table>
                        <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                        <tbody id="ordersTableBody"><tr><td colspan="8" class="empty-state">Loading...</td></tr></tbody>
                    </table>
                </div>`;
            currentOrderFilter = 'all';
            renderOrders();
        }
    </script>
</body>
</html>
