<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .account-wrap { max-width: 560px; margin: 0 auto; padding: 7rem 2rem 3rem; }
        .account-wrap h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 0.3rem; }
        .account-wrap .subtitle { font-size: 0.92rem; color: var(--gray-500); margin-bottom: 2rem; }
        .account-section { border: 1px solid var(--gray-200); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; }
        .account-section h2 { font-family: 'Instrument Serif', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { font-size: 0.82rem; font-weight: 500; color: var(--gray-700); margin-bottom: 0.4rem; display: block; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: var(--orange); }
        .form-group input[disabled] { background: var(--gray-50); color: var(--gray-500); }
        .consumer-cart-link { position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .consumer-cart-badge { position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; background: var(--orange); color: white; font-size: 0.68rem; font-weight: 700; border-radius: 100px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        @media (max-width: 768px) { .account-wrap { padding: 6rem 1.25rem 2rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg></div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/">Shop</a>
            <a href="/consumer-cart.html" class="consumer-cart-link">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                Cart <span class="consumer-cart-badge" id="consumerCartBadge">0</span>
            </a>
            <a href="/consumer-orders.html">Orders</a>
            <a href="/consumer-account.html" style="color:var(--orange);">Account</a>
            <a href="#" id="signOutLink">Sign Out</a>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="account-wrap">
        <h1>My Account</h1>
        <p class="subtitle" id="accountSubtitle">Loading...</p>
        <div id="alert" class="alert"></div>

        <div class="account-section">
            <h2>Profile Details</h2>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" disabled>
            </div>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="+353 ...">
            </div>
            <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">Save Changes</button>
        </div>

        <div class="account-section">
            <h2>Change Password</h2>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Min. 8 characters" minlength="8">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat new password" minlength="8">
            </div>
            <div id="pwAlert" class="alert"></div>
            <button class="btn btn-secondary" id="pwBtn" onclick="changePassword()">Update Password</button>
        </div>

        <div class="account-section" style="border-color:var(--gray-100);">
            <h2 style="color:var(--gray-500);">Account Actions</h2>
            <a href="/consumer-orders.html" class="btn btn-secondary" style="margin-bottom:0.75rem;display:block;">View My Orders</a>
            <button class="btn" style="width:100%;background:var(--gray-100);color:var(--gray-700);border:none;" id="signOutBtn" onclick="handleSignOut()">Sign Out</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://btzbifpqtzgpyvlyipxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0emJpZnBxdHpncHl2bHlpcHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTM0ODMsImV4cCI6MjA4NzUyOTQ4M30.oIdVuiKlstdYUi6bSjev61wGNr4hbL5rIWtwIwT_R-s';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        function toggleMobileMenu() { document.querySelector('.nav-links')?.classList.toggle('open'); }
        document.addEventListener('click', e => { if (e.target.closest('.nav-links a')) document.querySelector('.nav-links')?.classList.remove('open'); });

        function getCart() { try { return JSON.parse(localStorage.getItem('consumer_cart') || '[]'); } catch { return []; } }
        function updateBadge() {
            const count = getCart().reduce((s, i) => s + i.quantity, 0);
            const b = document.getElementById('consumerCartBadge');
            if (b) { b.textContent = count; b.style.display = count > 0 ? 'flex' : 'none'; }
        }

        document.getElementById('signOutLink').addEventListener('click', async (e) => { e.preventDefault(); await handleSignOut(); });

        async function handleSignOut() {
            await db.auth.signOut();
            window.location.href = '/';
        }

        (async () => {
            updateBadge();
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                window.location.href = '/consumer-login.html?return=/consumer-account.html';
                return;
            }
            currentUser = session.user;
            const meta = currentUser.user_metadata || {};
            document.getElementById('email').value = currentUser.email || '';
            document.getElementById('fullName').value = meta.full_name || '';
            document.getElementById('phone').value = meta.phone || '';
            document.getElementById('accountSubtitle').textContent = 'Manage your account details.';
        })();

        async function saveProfile() {
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = 'Saving...';

            const { error } = await db.auth.updateUser({
                data: { full_name: fullName, phone: phone }
            });

            if (error) {
                showAlert('alert', error.message, 'error');
            } else {
                showAlert('alert', 'Profile updated successfully.', 'success');
            }
            btn.disabled = false; btn.textContent = 'Save Changes';
        }

        async function changePassword() {
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
            if (!newPw) { showAlert('pwAlert', 'Please enter a new password.', 'error'); return; }
            if (newPw.length < 8) { showAlert('pwAlert', 'Password must be at least 8 characters.', 'error'); return; }
            if (newPw !== confirmPw) { showAlert('pwAlert', 'Passwords do not match.', 'error'); return; }

            const btn = document.getElementById('pwBtn');
            btn.disabled = true; btn.textContent = 'Updating...';

            const { error } = await db.auth.updateUser({ password: newPw });
            if (error) {
                showAlert('pwAlert', error.message, 'error');
            } else {
                showAlert('pwAlert', 'Password updated successfully.', 'success');
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }
            btn.disabled = false; btn.textContent = 'Update Password';
        }

        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.className = 'alert alert-' + type + ' show';
            el.textContent = msg;
        }
    </script>
</body>
</html>
