<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .orders-wrapper { max-width: 900px; margin: 0 auto; padding: 7rem 2rem 3rem; }
        .orders-wrapper h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
        .orders-wrapper .subtitle { font-size: 0.92rem; color: var(--gray-500); margin-bottom: 2rem; }

        .nav-cart { position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .cart-badge { position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; background: var(--orange); color: white; font-size: 0.68rem; font-weight: 700; border-radius: 100px; display: none; align-items: center; justify-content: center; padding: 0 4px; }

        .empty-orders { text-align: center; padding: 4rem 1rem; }
        .empty-orders h2 { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.5rem; }
        .empty-orders p { color: var(--gray-500); margin-bottom: 1.5rem; }
        .empty-orders .btn { width: auto; display: inline-flex; }

        .order-card { border: 1px solid var(--gray-200); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
        .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        .order-card-header .order-id { font-weight: 700; font-size: 0.9rem; }
        .order-card-header .order-date { font-size: 0.82rem; color: var(--gray-500); }
        .order-card-items { font-size: 0.88rem; color: var(--gray-700); margin-bottom: 0.8rem; line-height: 1.6; }
        .order-card-footer { display: flex; justify-content: space-between; align-items: center; }
        .order-card-footer .total { font-weight: 700; font-size: 1rem; }

        @media (max-width: 768px) { .orders-wrapper { padding: 6rem 1.25rem 2rem; } }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg>
            </div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div class="orders-wrapper">
        <h1>Your Orders</h1>
        <p class="subtitle">View your order history.</p>
        <div id="ordersContent">Loading...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/cart.js"></script>
    <script>
        (async () => {
            const result = await requireAuth(['approved']);
            if (!result) return;
            renderNavWithCart(result.profile);
            await updateCartBadge();
            await loadOrders();
        })();

        function renderNavWithCart(profile) {
            const navLinks = document.querySelector('.nav-links');
            if (!navLinks) return;
            let links = '';
            if (profile.is_admin) links += '<a href="/admin.html">Admin</a>';
            links += '<a href="/store.html">Store</a>';
            links += `<a href="/cart.html" class="nav-cart">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                Cart <span class="cart-badge">0</span></a>`;
            links += '<a href="/orders.html" style="color:var(--orange);">Orders</a>';
            links += `<a href="#" onclick="signOut(); return false;" class="nav-cta">Sign Out</a>`;
            navLinks.innerHTML = links;
        }

        async function loadOrders() {
            const user = await getCurrentUser();
            const { data: orders, error } = await db
                .from('orders')
                .select('*, order_items(*)')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            const content = document.getElementById('ordersContent');

            if (error || !orders || orders.length === 0) {
                content.innerHTML = `
                    <div class="empty-orders">
                        <h2>No orders yet</h2>
                        <p>Once you place an order, it will appear here.</p>
                        <a href="/store.html" class="btn btn-primary">Browse Store</a>
                    </div>`;
                return;
            }

            content.innerHTML = orders.map(order => {
                const items = order.order_items || [];
                const itemSummary = items.map(i => `${i.quantity}× ${esc(i.product_name)}`).join(', ');
                return `<div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">Order #${order.id.slice(0, 8).toUpperCase()}</span>
                        <span><span class="status-badge status-${order.status === 'paid' || order.status === 'completed' ? 'approved' : order.status === 'cancelled' ? 'rejected' : 'pending'}">${cap(order.status)}</span></span>
                        <span class="order-date">${fmtDate(order.created_at)}</span>
                    </div>
                    <div class="order-card-items">${itemSummary || 'No items'}</div>
                    <div class="order-card-footer">
                        <span>Payment: ${order.payment_method ? cap(order.payment_method) : '—'}</span>
                        <span class="total">€${Number(order.total).toFixed(2)}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
        function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
        function fmtDate(d) { return new Date(d).toLocaleDateString('en-IE', { day: 'numeric', month: 'short', year: 'numeric' }); }
    </script>
</body>
</html>
