<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .cart-wrap { max-width: 900px; margin: 0 auto; padding: 7rem 2rem 3rem; }
        .cart-wrap h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 0.3rem; }
        .cart-wrap .subtitle { font-size: 0.92rem; color: var(--gray-500); margin-bottom: 2rem; }
        .consumer-cart-link { position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .consumer-cart-badge { position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; background: var(--orange); color: white; font-size: 0.68rem; font-weight: 700; border-radius: 100px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .cart-item { display: grid; grid-template-columns: 80px 1fr auto auto auto; align-items: center; gap: 1.25rem; padding: 1.25rem 0; border-bottom: 1px solid var(--gray-100); }
        .cart-item-img { width: 80px; height: 80px; border-radius: 10px; overflow: hidden; background: var(--gray-100); }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-img .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--gray-300); font-size: 1.5rem; }
        .cart-item-info h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.15rem; }
        .cart-item-info .cat { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--orange); font-weight: 500; }
        .cart-item-price { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
        .qty-controls { display: flex; align-items: center; border: 1.5px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
        .qty-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: white; border: none; cursor: pointer; font-size: 1rem; font-family: 'DM Sans', sans-serif; color: var(--gray-700); }
        .qty-btn:hover { background: var(--gray-100); }
        .qty-val { width: 50px; height: 34px; text-align: center; font-size: 0.88rem; font-weight: 600; font-family: 'DM Sans', sans-serif; border: none; border-left: 1.5px solid var(--gray-200); border-right: 1.5px solid var(--gray-200); outline: none; -moz-appearance: textfield; }
        .qty-val::-webkit-outer-spin-button, .qty-val::-webkit-inner-spin-button { -webkit-appearance: none; }
        .remove-btn { background: none; border: none; cursor: pointer; color: var(--gray-300); transition: color 0.2s; padding: 0.5rem; }
        .remove-btn:hover { color: var(--red); }
        .cart-summary { margin-top: 2rem; padding: 2rem; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 16px; }
        .summary-row { display: flex; justify-content: space-between; padding: 0.5rem 0; }
        .summary-row.total { border-top: 2px solid var(--gray-200); margin-top: 0.5rem; padding-top: 1rem; font-weight: 700; font-size: 1.2rem; }
        .summary-row .label { color: var(--gray-500); font-size: 0.9rem; }
        .summary-row .val { font-weight: 600; }
        .cart-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        .cart-actions .btn { flex: 1; }
        .empty-cart { text-align: center; padding: 4rem 1rem; }
        .empty-cart h2 { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.5rem; }
        .empty-cart p { color: var(--gray-500); margin-bottom: 1.5rem; }
        .empty-cart .btn { width: auto; display: inline-flex; }
        @media (max-width: 768px) {
            .cart-wrap { padding: 6rem 1.25rem 2rem; }
            .cart-item { grid-template-columns: 60px 1fr; gap: 0.75rem; }
            .cart-item-img { width: 60px; height: 60px; }
            .cart-item-price, .qty-controls, .remove-btn { grid-column: 2; }
            .cart-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg></div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/">Shop</a>
            <a href="/wholesale.html">Wholesale</a>
            <a href="/consumer-cart.html" class="consumer-cart-link" style="color:var(--orange);">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                Cart <span class="consumer-cart-badge" id="consumerCartBadge">0</span>
            </a>
            <span id="navAuthLinks" style="display:contents"></span>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="cart-wrap">
        <h1>Your Cart</h1>
        <p class="subtitle" id="cartSubtitle">Loading...</p>
        <div id="cartContent"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://btzbifpqtzgpyvlyipxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0emJpZnBxdHpncHl2bHlpcHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTM0ODMsImV4cCI6MjA4NzUyOTQ4M30.oIdVuiKlstdYUi6bSjev61wGNr4hbL5rIWtwIwT_R-s';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let productMap = {};

        function toggleMobileMenu() { document.querySelector('.nav-links')?.classList.toggle('open'); }
        document.addEventListener('click', e => { if (e.target.closest('.nav-links a')) document.querySelector('.nav-links')?.classList.remove('open'); });

        // ── Consumer nav auth ──
        (async () => {
            const { data: { session } } = await db.auth.getSession();
            const el = document.getElementById('navAuthLinks');
            if (!el) return;
            if (session) {
                el.innerHTML = `<a href="/consumer-orders.html">Orders</a><a href="/consumer-account.html">Account</a><a href="#" onclick="(async()=>{await db.auth.signOut();window.location.reload();})();return false;">Sign Out</a>`;
            } else {
                el.innerHTML = `<a href="/consumer-login.html">Sign In</a>`;
            }
        })();

        function getCart() { try { return JSON.parse(localStorage.getItem('consumer_cart') || '[]'); } catch { return []; } }
        function saveCart(cart) { localStorage.setItem('consumer_cart', JSON.stringify(cart)); updateBadge(); }
        function updateBadge() {
            const count = getCart().reduce((s, i) => s + i.quantity, 0);
            const badge = document.getElementById('consumerCartBadge');
            if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
        }
        function getRetailPrice(p) { if (p.is_on_sale_retail && p.retail_sale_price) return Number(p.retail_sale_price); return p.retail_price ? Number(p.retail_price) : Number(p.price); }

        (async () => {
            updateBadge();
            const cart = getCart();
            if (cart.length === 0) { renderEmpty(); return; }
            const ids = cart.map(c => c.product_id);
            const { data: products } = await db.from('products').select('*').in('id', ids);
            (products || []).forEach(p => productMap[p.id] = p);
            renderCart();
        })();

        function renderEmpty() {
            document.getElementById('cartSubtitle').textContent = '';
            document.getElementById('cartContent').innerHTML = '<div class="empty-cart"><h2>Your cart is empty</h2><p>Browse our products and add items to get started.</p><a href="/" class="btn btn-primary">Shop Now</a></div>';
        }

        function renderCart() {
            const cart = getCart().filter(c => productMap[c.product_id]);
            if (cart.length === 0) { renderEmpty(); return; }
            const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
            const total = cart.reduce((s, i) => s + getRetailPrice(productMap[i.product_id]) * i.quantity, 0);
            document.getElementById('cartSubtitle').textContent = totalItems + ' item' + (totalItems !== 1 ? 's' : '') + ' in your cart';

            let html = '<div class="cart-items">';
            html += cart.map(item => {
                const p = productMap[item.product_id];
                const price = getRetailPrice(p);
                const hasImg = p.image_url && p.image_url.length > 0;
                return `<div class="cart-item">
                    <div class="cart-item-img">${hasImg ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}">` : '<div class="no-img">📦</div>'}</div>
                    <div class="cart-item-info"><div class="cat">${esc(p.category)}</div><h3>${esc(p.name)}</h3></div>
                    <div class="cart-item-price">€${price.toFixed(2)}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty('${p.id}', ${item.quantity - 1})">−</button>
                        <input type="number" class="qty-val" value="${item.quantity}" min="1" max="9999" onchange="changeQty('${p.id}', parseInt(this.value)||1)" onkeydown="if(event.key==='Enter')this.blur();">
                        <button class="qty-btn" onclick="changeQty('${p.id}', ${item.quantity + 1})">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem('${p.id}')" title="Remove"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg></button>
                </div>`;
            }).join('');
            html += '</div>';

            html += `<div class="cart-summary">
                <div class="summary-row"><span class="label">Subtotal (${totalItems} items)</span><span class="val">€${total.toFixed(2)}</span></div>
                <div class="summary-row total"><span>Total</span><span>€${total.toFixed(2)}</span></div>
                <div class="cart-actions">
                    <a href="/" class="btn btn-secondary">Continue Shopping</a>
                    <a href="/consumer-checkout.html" class="btn btn-primary">Checkout — €${total.toFixed(2)}</a>
                </div>
            </div>`;

            document.getElementById('cartContent').innerHTML = html;
        }

        function changeQty(productId, newQty) {
            if (newQty <= 0) { removeItem(productId); return; }
            const cart = getCart();
            const item = cart.find(c => c.product_id === productId);
            if (item) item.quantity = newQty;
            saveCart(cart);
            renderCart();
        }

        function removeItem(productId) {
            saveCart(getCart().filter(c => c.product_id !== productId));
            renderCart();
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
    </script>
</body>
</html>
