<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .co-wrap { max-width: 900px; margin: 0 auto; padding: 7rem 2rem 3rem; }
        .co-wrap h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 0.3rem; }
        .co-wrap .subtitle { font-size: 0.92rem; color: var(--gray-500); margin-bottom: 2rem; }
        .consumer-cart-link { position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .consumer-cart-badge { position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; background: var(--orange); color: white; font-size: 0.68rem; font-weight: 700; border-radius: 100px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .co-grid { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; align-items: start; }
        .co-form { border: 1px solid var(--gray-200); border-radius: 16px; padding: 1.5rem; }
        .co-form h2 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 1rem; }
        .co-form .form-group { margin-bottom: 1rem; }
        .co-form .form-group label { font-size: 0.82rem; font-weight: 500; color: var(--gray-700); margin-bottom: 0.4rem; display: block; }
        .co-form .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
        .co-form .form-group input:focus { border-color: var(--orange); }
        .co-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .order-summary { border: 1px solid var(--gray-200); border-radius: 16px; padding: 1.5rem; }
        .order-summary h2 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 1rem; }
        .sum-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--gray-100); }
        .sum-item:last-of-type { border-bottom: none; }
        .sum-item .name { font-size: 0.88rem; font-weight: 500; }
        .sum-item .qty { font-size: 0.78rem; color: var(--gray-500); }
        .sum-item .line-price { font-weight: 600; font-size: 0.88rem; }
        .sum-total { display: flex; justify-content: space-between; padding: 1rem 0 0; border-top: 2px solid var(--gray-200); margin-top: 0.5rem; font-weight: 700; font-size: 1.2rem; }
        .processing-overlay { display: none; position: fixed; inset: 0; background: #FAFAFA; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; gap: 1rem; }
        .processing-overlay.show { display: flex; }
        .processing-overlay .spinner-lg { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-overlay p { font-size: 0.95rem; color: var(--gray-700); }
        @media (max-width: 768px) { .co-wrap { padding: 6rem 1.25rem 2rem; } .co-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg></div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/">Shop</a>
            <a href="/wholesale.html">Wholesale</a>
            <a href="/consumer-cart.html" class="consumer-cart-link">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                Cart <span class="consumer-cart-badge" id="consumerCartBadge">0</span>
            </a>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="processing-overlay" id="processingOverlay">
        <div class="spinner-lg"></div>
        <p id="processingText">Processing...</p>
    </div>

    <div class="co-wrap">
        <h1>Checkout</h1>
        <p class="subtitle">Enter your details to complete your purchase.</p>
        <div id="alert" class="alert"></div>
        <div class="co-grid" id="checkoutContent"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://btzbifpqtzgpyvlyipxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0emJpZnBxdHpncHl2bHlpcHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTM0ODMsImV4cCI6MjA4NzUyOTQ4M30.oIdVuiKlstdYUi6bSjev61wGNr4hbL5rIWtwIwT_R-s';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let productMap = {};
        let currentUser = null;

        function toggleMobileMenu() { document.querySelector('.nav-links')?.classList.toggle('open'); }
        document.addEventListener('click', e => { if (e.target.closest('.nav-links a')) document.querySelector('.nav-links')?.classList.remove('open'); });
        function getCart() { try { return JSON.parse(localStorage.getItem('consumer_cart') || '[]'); } catch { return []; } }
        function updateBadge() {
            const count = getCart().reduce((s, i) => s + i.quantity, 0);
            const b = document.getElementById('consumerCartBadge');
            if (b) { b.textContent = count; b.style.display = count > 0 ? 'flex' : 'none'; }
        }
        function getRetailPrice(p) { if (p.is_on_sale_retail && p.retail_sale_price) return Number(p.retail_sale_price); return p.retail_price ? Number(p.retail_price) : Number(p.price); }

        let shipSettings = { standard_rate: 4.99, free_threshold: 50, express_rate: 9.99, express_enabled: false, delivery_note: '' };
        let activePromos = [];

        (async () => {
            updateBadge();

            // Require authentication
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                showAuthWall();
                return;
            }
            currentUser = session.user;

            // Check if returning from a failed/abandoned Stripe payment
            const pendingOrderId = localStorage.getItem('consumer_order_id');
            if (pendingOrderId) {
                const { data: pendingOrder } = await db
                    .from('orders')
                    .select('*, order_items(*)')
                    .eq('id', pendingOrderId)
                    .single();

                if (pendingOrder && pendingOrder.status === 'pending') {
                    showResumeUI(pendingOrder);
                    return;
                } else {
                    // Order already completed or not found — clear state and restore cart
                    localStorage.removeItem('consumer_order_id');
                    localStorage.removeItem('consumer_stripe_session');
                    const backup = localStorage.getItem('consumer_cart_backup');
                    if (backup) { localStorage.setItem('consumer_cart', backup); localStorage.removeItem('consumer_cart_backup'); }
                }
            }

            const cart = getCart();
            if (cart.length === 0) { window.location.href = '/consumer-cart.html'; return; }
            const ids = cart.map(c => c.product_id);
            const { data: products } = await db.from('products').select('*').in('id', ids);
            (products || []).forEach(p => productMap[p.id] = p);

            // Load shop settings
            const { data: shipRow } = await db.from('shop_settings').select('value').eq('key', 'shipping').single();
            if (shipRow) shipSettings = shipRow.value;
            const { data: promoRow } = await db.from('shop_settings').select('value').eq('key', 'promotions').single();
            if (promoRow) {
                const now = new Date().toISOString().split('T')[0];
                activePromos = (promoRow.value || []).filter(p => (!p.start_date || p.start_date <= now) && (!p.end_date || p.end_date >= now));
            }

            renderCheckout();
        })();

        function showAuthWall() {
            document.getElementById('checkoutContent').innerHTML = `
                <div style="grid-column:1/-1;max-width:480px;margin:0 auto;width:100%;text-align:center;padding:2rem 0;">
                    <div style="width:56px;height:56px;background:var(--orange);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
                        <svg width="28" height="28" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <h2 style="font-family:'Instrument Serif',serif;font-size:1.5rem;font-weight:400;margin-bottom:0.5rem;">Sign in to complete your order</h2>
                    <p style="color:var(--gray-500);font-size:0.9rem;margin-bottom:1.75rem;line-height:1.5;">We require an account so we can keep you updated on your order and help if anything goes wrong.</p>
                    <a href="/consumer-login.html?return=${encodeURIComponent(window.location.pathname)}" class="btn btn-primary" style="width:100%;margin-bottom:0.75rem;display:block;">Sign In</a>
                    <a href="/consumer-register.html?return=${encodeURIComponent(window.location.pathname)}" class="btn btn-secondary" style="width:100%;display:block;">Create a Free Account</a>
                    <p style="margin-top:1.25rem;font-size:0.8rem;color:var(--gray-400);">Business customer? <a href="/login.html" style="color:var(--orange);">Wholesale sign in</a></p>
                </div>`;
        }

        function showResumeUI(order) {
            const items = order.order_items || [];
            const itemRows = items.map(i =>
                `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--gray-100);font-size:0.88rem;">
                    <span>${esc(i.product_name)} <span style="color:var(--gray-500);">×${i.quantity}</span></span>
                    <span>€${(Number(i.unit_price) * i.quantity).toFixed(2)}</span>
                </div>`
            ).join('');
            const itemsSubtotal = items.reduce((s, i) => s + Number(i.unit_price) * i.quantity, 0);
            const shipping = Math.round((Number(order.total) - itemsSubtotal) * 100) / 100;

            document.getElementById('checkoutContent').innerHTML = `
                <div style="grid-column:1/-1;max-width:520px;margin:0 auto;width:100%;">
                    <div style="background:#FFFBEB;border:1px solid #FCD34D;border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;">
                        <p style="font-weight:600;margin-bottom:0.25rem;">⚠ You have an incomplete order</p>
                        <p style="font-size:0.85rem;color:#92400E;margin:0;">Your payment didn't go through. You can complete it now or start a fresh order.</p>
                    </div>
                    <div style="border:1px solid var(--gray-200);border-radius:14px;padding:1.5rem;margin-bottom:1rem;">
                        <h2 style="font-family:'Instrument Serif',serif;font-size:1.2rem;font-weight:400;margin-bottom:1rem;">Order Summary</h2>
                        ${itemRows}
                        ${shipping > 0 ? `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;font-size:0.88rem;"><span>Shipping</span><span>€${shipping.toFixed(2)}</span></div>` : ''}
                        <div style="display:flex;justify-content:space-between;padding:0.75rem 0 0;border-top:2px solid var(--gray-200);margin-top:0.25rem;font-weight:700;font-size:1.1rem;">
                            <span>Total</span><span>€${Number(order.total).toFixed(2)}</span>
                        </div>
                    </div>
                    <div id="resumeAlert" class="alert" style="margin-bottom:1rem;"></div>
                    <button class="btn btn-primary" style="width:100%;margin-bottom:0.75rem;" id="resumeBtn" onclick="resumePayment('${order.id}')">Complete Payment — €${Number(order.total).toFixed(2)}</button>
                    <button class="btn btn-secondary" style="width:100%;" onclick="startNewOrder()">Start a New Order Instead</button>
                </div>`;
        }

        async function resumePayment(orderId) {
            const btn = document.getElementById('resumeBtn');
            btn.disabled = true; btn.textContent = 'Redirecting to payment...';
            try {
                const { data: order } = await db.from('orders').select('*, order_items(*)').eq('id', orderId).single();
                const items = (order.order_items || []).map(i => ({ name: i.product_name, price: Number(i.unit_price), quantity: i.quantity }));
                const itemsSubtotal = items.reduce((s, i) => s + i.price * i.quantity, 0);
                const shipping = Math.round((Number(order.total) - itemsSubtotal) * 100) / 100;
                if (shipping > 0) items.push({ name: 'Shipping', price: shipping, quantity: 1 });

                const baseUrl = window.location.origin;
                const response = await fetch('/.netlify/functions/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items,
                        order_id: orderId,
                        customer_email: order.guest_email || '',
                        success_url: baseUrl + '/consumer-success.html?order_id=' + orderId,
                        cancel_url: baseUrl + '/consumer-checkout.html'
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                localStorage.setItem('consumer_order_id', orderId);
                localStorage.setItem('consumer_stripe_session', data.session_id);
                window.location.href = data.url;
            } catch (err) {
                btn.disabled = false; btn.textContent = 'Complete Payment — €' + Number(0).toFixed(2);
                showAlert('resumeAlert', err.message, 'error');
            }
        }

        function startNewOrder() {
            localStorage.removeItem('consumer_order_id');
            localStorage.removeItem('consumer_stripe_session');
            const backup = localStorage.getItem('consumer_cart_backup');
            if (backup) { localStorage.setItem('consumer_cart', backup); localStorage.removeItem('consumer_cart_backup'); }
            window.location.href = '/consumer-cart.html';
        }

        function calcShippingAndPromos(subtotal) {
            // Shipping
            let shipping = shipSettings.standard_rate || 0;
            let shippingLabel = 'Standard Shipping';
            if (shipSettings.free_threshold > 0 && subtotal >= shipSettings.free_threshold) {
                shipping = 0;
                shippingLabel = 'Free Shipping';
            }

            // Promotions
            let discount = 0;
            let promoLabel = '';
            for (const p of activePromos) {
                if (subtotal < (p.min_spend || 0)) continue;
                if (p.type === 'amount_off_threshold') {
                    discount = Math.max(discount, p.value || 0);
                    if (p.value >= discount) promoLabel = p.name + ': -€' + Number(p.value).toFixed(2);
                } else if (p.type === 'percent_off_threshold') {
                    const pctOff = subtotal * ((p.value || 0) / 100);
                    if (pctOff > discount) { discount = pctOff; promoLabel = p.name + ': -' + p.value + '%'; }
                } else if (p.type === 'free_shipping_threshold') {
                    shipping = 0;
                    shippingLabel = 'Free Shipping (' + p.name + ')';
                }
            }

            return { shipping, shippingLabel, discount: Math.round(discount * 100) / 100, promoLabel };
        }

        function renderCheckout() {
            const cart = getCart().filter(c => productMap[c.product_id]);
            const subtotal = cart.reduce((s, i) => s + getRetailPrice(productMap[i.product_id]) * i.quantity, 0);
            const { shipping, shippingLabel, discount, promoLabel } = calcShippingAndPromos(subtotal);
            const total = Math.max(0, subtotal + shipping - discount);

            let html = '';

            const meta = currentUser?.user_metadata || {};
            const prefillName = esc(meta.full_name || '');
            const prefillEmail = esc(currentUser?.email || '');
            const prefillPhone = esc(meta.phone || '');

            // Left: Form
            html += `<div class="co-form">
                <h2>Your Details</h2>
                <p style="font-size:0.82rem;color:var(--gray-500);margin:-0.5rem 0 1rem;">Signed in as <strong>${prefillEmail}</strong>. <a href="#" onclick="handleSignOut(event)" style="color:var(--orange);">Not you?</a></p>
                <div class="form-row">
                    <div class="form-group"><label for="coName">Full Name *</label><input type="text" id="coName" placeholder="Your name" value="${prefillName}" required></div>
                    <div class="form-group"><label for="coEmail">Email *</label><input type="email" id="coEmail" placeholder="you@example.com" value="${prefillEmail}" required></div>
                </div>
                <div class="form-group"><label for="coPhone">Phone</label><input type="tel" id="coPhone" placeholder="Your phone number" value="${prefillPhone}"></div>
                <h2 style="margin-top:1.5rem;">Shipping Address</h2>
                <div class="form-group"><label for="coAddr1">Address Line 1 *</label><input type="text" id="coAddr1" placeholder="Street address" required></div>
                <div class="form-group"><label for="coAddr2">Address Line 2</label><input type="text" id="coAddr2" placeholder="Apt, suite, etc."></div>
                <div class="form-row">
                    <div class="form-group"><label for="coCity">City *</label><input type="text" id="coCity" placeholder="City" required></div>
                    <div class="form-group"><label for="coCounty">County</label><input type="text" id="coCounty" placeholder="County"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="coEircode">Eircode</label><input type="text" id="coEircode" placeholder="e.g. D01 AB12"></div>
                    <div class="form-group"></div>
                </div>
                <button class="btn btn-primary" style="width:100%;margin-top:1rem;" id="payBtn" onclick="handlePay()">Pay — €${total.toFixed(2)}</button>
                ${shipSettings.delivery_note ? `<p style="font-size:0.78rem;color:var(--gray-500);text-align:center;margin-top:0.75rem;">${esc(shipSettings.delivery_note)}</p>` : ''}
                <p style="font-size:0.72rem;color:var(--gray-400);text-align:center;margin-top:0.5rem;">By placing an order you agree to our <a href="/terms.html" style="color:var(--orange);">Terms & Conditions</a> and <a href="/privacy-policy.html" style="color:var(--orange);">Privacy Policy</a>.</p>
            </div>`;

            // Right: Summary
            html += '<div class="order-summary"><h2>Order Summary</h2>';
            cart.forEach(item => {
                const p = productMap[item.product_id];
                const price = getRetailPrice(p);
                html += `<div class="sum-item"><div><div class="name">${esc(p.name)}</div><div class="qty">${item.quantity} × €${price.toFixed(2)}</div></div><div class="line-price">€${(price * item.quantity).toFixed(2)}</div></div>`;
            });
            html += `<div style="padding:0.5rem 0;border-top:1px solid var(--gray-100);margin-top:0.25rem;">`;
            html += `<div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:0.3rem;"><span>Subtotal</span><span>€${subtotal.toFixed(2)}</span></div>`;
            html += `<div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:0.3rem;"><span>${shippingLabel}</span><span>${shipping === 0 ? 'FREE' : '€' + shipping.toFixed(2)}</span></div>`;
            if (discount > 0) {
                html += `<div style="display:flex;justify-content:space-between;font-size:0.88rem;color:var(--green);margin-bottom:0.3rem;"><span>${esc(promoLabel)}</span><span>-€${discount.toFixed(2)}</span></div>`;
            }
            html += `</div>`;
            html += `<div class="sum-total"><span>Total</span><span>€${total.toFixed(2)}</span></div>`;
            if (activePromos.length > 0 && discount === 0) {
                const hint = activePromos.find(p => p.min_spend > subtotal);
                if (hint) html += `<div style="font-size:0.78rem;color:var(--orange);margin-top:0.5rem;text-align:center;">${esc(hint.name)}: Spend €${Number(hint.min_spend).toFixed(2)} to save!</div>`;
            }
            html += '</div>';

            document.getElementById('checkoutContent').innerHTML = html;
        }

        async function handlePay() {
            const name = document.getElementById('coName').value.trim();
            const email = document.getElementById('coEmail').value.trim();
            const phone = document.getElementById('coPhone').value.trim();
            const addr1 = document.getElementById('coAddr1').value.trim();
            const addr2 = document.getElementById('coAddr2').value.trim();
            const city = document.getElementById('coCity').value.trim();
            const county = document.getElementById('coCounty').value.trim();
            const eircode = document.getElementById('coEircode').value.trim();

            if (!name || !email || !addr1 || !city) {
                showAlert('alert', 'Please fill in all required fields.', 'error');
                return;
            }

            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            showProcessing('Saving order...');

            try {
                const cart = getCart().filter(c => productMap[c.product_id]);
                const subtotal = cart.reduce((s, i) => s + getRetailPrice(productMap[i.product_id]) * i.quantity, 0);
                const { shipping, shippingLabel, discount, promoLabel } = calcShippingAndPromos(subtotal);
                const total = Math.max(0, subtotal + shipping - discount);

                // Build items for DB
                const dbItems = cart.map(i => {
                    const p = productMap[i.product_id];
                    return { product_id: p.id, product_name: p.name, quantity: i.quantity, unit_price: getRetailPrice(p) };
                });

                // Save order to database
                const { data: newOrder, error: orderErr } = await db.from('orders').insert({
                    user_id: currentUser.id,
                    guest_name: name,
                    guest_email: email,
                    guest_phone: phone,
                    shipping_address_1: addr1,
                    shipping_address_2: addr2,
                    shipping_city: city,
                    shipping_county: county,
                    shipping_eircode: eircode,
                    subtotal: subtotal,
                    total: total,
                    payment_method: 'card',
                    status: 'pending'
                }).select('id').single();

                if (orderErr) throw new Error('Failed to save order: ' + orderErr.message);
                const orderId = newOrder.id;

                // Save order items
                const orderItems = dbItems.map(i => ({ ...i, order_id: orderId }));
                const { error: itemsErr } = await db.from('order_items').insert(orderItems);
                if (itemsErr) throw new Error('Failed to save order items: ' + itemsErr.message);

                // Reserve stock for each item
                for (const item of cart) {
                    await db.rpc('deduct_stock', { p_product_id: item.product_id, p_quantity: item.quantity });
                }

                // Build Stripe items (products + shipping + discount)
                showProcessing('Redirecting to payment...');
                const stripeItems = cart.map(i => {
                    const p = productMap[i.product_id];
                    return { name: p.name, price: getRetailPrice(p), quantity: i.quantity };
                });
                if (shipping > 0) {
                    stripeItems.push({ name: shippingLabel, price: shipping, quantity: 1 });
                }
                if (discount > 0) {
                    stripeItems.push({ name: promoLabel || 'Discount', price: -discount, quantity: 1 });
                }

                const baseUrl = window.location.origin;
                const response = await fetch('/.netlify/functions/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: stripeItems,
                        order_id: orderId,
                        customer_email: email,
                        success_url: baseUrl + '/consumer-success.html?order_id=' + orderId,
                        cancel_url: baseUrl + '/consumer-checkout.html'
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                // Store order ID and session ID for the success page
                localStorage.setItem('consumer_order_id', orderId);
                localStorage.setItem('consumer_stripe_session', data.session_id);

                // Backup cart then clear
                localStorage.setItem('consumer_cart_backup', localStorage.getItem('consumer_cart'));
                localStorage.removeItem('consumer_cart');

                window.location.href = data.url;
            } catch (err) {
                hideProcessing();
                showAlert('alert', err.message, 'error');
                btn.disabled = false;
            }
        }

        async function handleSignOut(e) {
            e.preventDefault();
            await db.auth.signOut();
            window.location.href = '/consumer-login.html?return=' + encodeURIComponent(window.location.pathname);
        }

        function showAlert(id, msg, type) { const el = document.getElementById(id); el.className = 'alert alert-' + type + ' show'; el.textContent = msg; }
        function showProcessing(t) { document.getElementById('processingText').textContent = t; document.getElementById('processingOverlay').classList.add('show'); }
        function hideProcessing() { document.getElementById('processingOverlay').classList.remove('show'); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
    </script>
</body>
</html>
