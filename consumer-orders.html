<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — DrMobilePhone</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .orders-wrapper { max-width: 860px; margin: 0 auto; padding: 7rem 2rem 3rem; }
        .orders-wrapper h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 0.3rem; }
        .orders-wrapper .subtitle { font-size: 0.92rem; color: var(--gray-500); margin-bottom: 2rem; }

        .consumer-cart-link { position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .consumer-cart-badge { position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; background: var(--orange); color: white; font-size: 0.68rem; font-weight: 700; border-radius: 100px; display: none; align-items: center; justify-content: center; padding: 0 4px; }

        .empty-orders { text-align: center; padding: 4rem 1rem; }
        .empty-orders h2 { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.5rem; }
        .empty-orders p { color: var(--gray-500); margin-bottom: 1.5rem; }
        .empty-orders .btn { width: auto; display: inline-flex; }

        .order-card { border: 1px solid var(--gray-200); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; transition: box-shadow 0.2s, border-color 0.2s; }
        .order-card.clickable { cursor: pointer; }
        .order-card.clickable:hover { border-color: var(--orange); box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .order-card.pending-payment { border-color: #FCD34D; background: #FFFBEB; }
        .order-card-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .order-id { font-weight: 700; font-size: 0.9rem; }
        .order-date { font-size: 0.82rem; color: var(--gray-500); }
        .order-summary-line { font-size: 0.84rem; color: var(--gray-500); margin-top: 0.3rem; }
        .order-total { font-weight: 700; font-size: 1rem; }
        .pay-now-bar { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #FCD34D; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .pay-now-bar p { font-size: 0.82rem; color: #92400E; margin: 0; }
        .btn-pay-now { background: var(--orange); color: white; border: none; border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s; }
        .btn-pay-now:hover { opacity: 0.88; }
        .btn-pay-now:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.88rem; color: var(--gray-500); margin-bottom: 1.5rem; cursor: pointer; transition: color 0.2s; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; }
        .back-link:hover { color: var(--orange); }

        /* Order detail */
        .print-doc { max-width: 800px; margin: 0 auto; }
        .print-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--black); }
        .print-header .company h2 { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.2rem; }
        .print-header .company h2 span { color: var(--orange); }
        .print-header .company p { font-size: 0.8rem; color: var(--gray-500); line-height: 1.5; }
        .print-header .doc-title { text-align: right; }
        .print-header .doc-title h1 { font-family: 'Instrument Serif', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 0.3rem; }
        .print-header .doc-title p { font-size: 0.85rem; color: var(--gray-500); }
        .info-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .info-block label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--gray-500); display: block; margin-bottom: 0.3rem; }
        .info-block p { font-size: 0.88rem; line-height: 1.5; }
        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        .items-table thead th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-500); font-weight: 600; padding: 0.6rem 0.8rem; border-bottom: 2px solid var(--gray-200); }
        .items-table thead th.right { text-align: right; }
        .items-table tbody td { padding: 0.7rem 0.8rem; font-size: 0.88rem; border-bottom: 1px solid var(--gray-100); }
        .items-table tbody td.right { text-align: right; }
        .items-table tbody td.product-name { font-weight: 500; }
        .totals-section { display: flex; justify-content: flex-end; margin-bottom: 2rem; }
        .totals-box { width: 260px; }
        .totals-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.9rem; }
        .totals-row.grand { border-top: 2px solid var(--black); margin-top: 0.3rem; padding-top: 0.6rem; font-weight: 700; font-size: 1.1rem; }
        .print-btn { margin-bottom: 1.5rem; }
        .print-btn .btn { width: auto; }

        @media print {
            body * { visibility: hidden; }
            .print-doc, .print-doc * { visibility: visible; }
            .print-doc { position: absolute; left: 0; top: 0; width: 100%; padding: 20mm; }
            .print-btn, nav, .orders-wrapper > h1, .orders-wrapper > .subtitle, .back-link { display: none !important; }
        }
        @media (max-width: 768px) {
            .orders-wrapper { padding: 6rem 1.25rem 2rem; }
            .print-header { flex-direction: column; gap: 1rem; }
            .print-header .doc-title { text-align: left; }
            .info-columns { grid-template-columns: 1fr; gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/shop" class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg></div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/shop">Shop</a>
            <a href="/consumer-cart.html" class="consumer-cart-link">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                Cart <span class="consumer-cart-badge" id="consumerCartBadge">0</span>
            </a>
            <a href="/consumer-orders.html" style="color:var(--orange);">Orders</a>
            <a href="/consumer-account.html">Account</a>
            <a href="#" id="signOutLink">Sign Out</a>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="orders-wrapper">
        <h1>My Orders</h1>
        <p class="subtitle">Your order history.</p>
        <div id="ordersContent"><p style="color:var(--gray-400);">Loading...</p></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://btzbifpqtzgpyvlyipxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0emJpZnBxdHpncHl2bHlpcHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTM0ODMsImV4cCI6MjA4NzUyOTQ4M30.oIdVuiKlstdYUi6bSjev61wGNr4hbL5rIWtwIwT_R-s';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let allOrders = [];

        function toggleMobileMenu() { document.querySelector('.nav-links')?.classList.toggle('open'); }
        document.addEventListener('click', e => { if (e.target.closest('.nav-links a')) document.querySelector('.nav-links')?.classList.remove('open'); });

        function getCart() { try { return JSON.parse(localStorage.getItem('consumer_cart') || '[]'); } catch { return []; } }
        function updateBadge() {
            const count = getCart().reduce((s, i) => s + i.quantity, 0);
            const b = document.getElementById('consumerCartBadge');
            if (b) { b.textContent = count; b.style.display = count > 0 ? 'flex' : 'none'; }
        }

        document.getElementById('signOutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            await db.auth.signOut();
            window.location.href = '/shop';
        });

        (async () => {
            updateBadge();
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                window.location.href = '/consumer-login.html?return=/consumer-orders.html';
                return;
            }
            currentUser = session.user;
            await loadOrders();
        })();

        async function loadOrders() {
            const { data: orders, error } = await db
                .from('orders')
                .select('*, order_items(*)')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            const content = document.getElementById('ordersContent');
            if (error || !orders || orders.length === 0) {
                content.innerHTML = `<div class="empty-orders"><h2>No orders yet</h2><p>Once you place an order it will appear here.</p><a href="/shop" class="btn btn-primary">Shop Now</a></div>`;
                return;
            }
            allOrders = orders;
            renderOrderList();
        }

        function renderOrderList() {
            const content = document.getElementById('ordersContent');
            content.innerHTML = allOrders.map(order => {
                const items = order.order_items || [];
                const itemCount = items.reduce((s, i) => s + i.quantity, 0);
                const isPendingCard = order.status === 'pending' && order.payment_method === 'card';
                const statusClass = ['paid', 'completed', 'shipped'].includes(order.status) ? 'approved' : order.status === 'cancelled' ? 'rejected' : 'pending';
                const payBar = isPendingCard ? `
                    <div class="pay-now-bar" onclick="event.stopPropagation()">
                        <p>⚠ Payment incomplete — your order is reserved but not confirmed.</p>
                        <button class="btn-pay-now" id="paynow-${order.id}" onclick="retryPayment('${order.id}')">Complete Payment →</button>
                    </div>` : '';
                return `<div class="order-card clickable${isPendingCard ? ' pending-payment' : ''}" onclick="viewOrder('${order.id}')">
                    <div class="order-card-row">
                        <span class="order-id">Order #${order.id.slice(0,8).toUpperCase()}</span>
                        <span class="status-badge status-${statusClass}">${cap(order.status)}</span>
                        <span class="order-date">${fmtDate(order.created_at)}</span>
                        <span class="order-total">€${Number(order.total).toFixed(2)}</span>
                    </div>
                    <div class="order-summary-line">${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
                    ${payBar}
                </div>`;
            }).join('');
        }

        function viewOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            const items = order.order_items || [];
            const subtotal = Number(order.subtotal) || items.reduce((s, i) => s + Number(i.unit_price) * i.quantity, 0);
            const shipping = Math.round((Number(order.total) - subtotal) * 100) / 100;
            const isPendingCard = order.status === 'pending' && order.payment_method === 'card';
            const canCancel = ['pending', 'paid'].includes(order.status);

            document.getElementById('ordersContent').innerHTML = `
                <button class="back-link" onclick="renderOrderList()">← Back to Orders</button>
                ${isPendingCard ? `
                <div style="background:#FFFBEB;border:1px solid #FCD34D;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
                    <p style="margin:0;font-size:0.88rem;color:#92400E;">⚠ Payment was not completed. Your order is reserved but will not be processed until payment is received.</p>
                    <button class="btn-pay-now" id="paynow-detail-${order.id}" onclick="retryPayment('${order.id}')">Complete Payment →</button>
                </div>` : ''}
                <div id="cancelAlert" class="alert" style="margin-bottom:1rem;"></div>
                <div style="display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;">
                    <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨 Print</button>
                    ${canCancel ? `<button class="btn btn-sm" id="cancelBtn" style="background:#FEF2F2;color:#DC2626;border:1.5px solid #FECACA;" onclick="cancelOrder('${order.id}')">Cancel Order</button>` : ''}
                </div>
                <div class="print-doc">
                    <div class="print-header">
                        <div class="company">
                            <h2>DrMobile<span>Phone</span></h2>
                            <p>Unit 1 College Way, Kilcock Road<br>Clane, Co. Kildare, Ireland<br>045 949 611 &nbsp;·&nbsp; 089 989 9550<br>info@drmobilephone.ie</p>
                        </div>
                        <div class="doc-title">
                            <h1>Order Confirmation</h1>
                            <p><strong>#${order.id.slice(0,8).toUpperCase()}</strong><br>Date: ${fmtDate(order.created_at)}</p>
                        </div>
                    </div>
                    <div class="info-columns">
                        <div class="info-block">
                            <label>Delivery To</label>
                            <p><strong>${esc(order.guest_name || '')}</strong><br>
                            ${esc(order.shipping_address_1 || '')}${order.shipping_address_2 ? '<br>' + esc(order.shipping_address_2) : ''}<br>
                            ${esc(order.shipping_city || '')}${order.shipping_county ? ', ' + esc(order.shipping_county) : ''}${order.shipping_eircode ? ' ' + esc(order.shipping_eircode) : ''}</p>
                        </div>
                        <div class="info-block">
                            <label>Order Info</label>
                            <p>Status: ${cap(order.status)}<br>Email: ${esc(order.guest_email || currentUser.email || '')}</p>
                        </div>
                    </div>
                    <table class="items-table">
                        <thead><tr><th>#</th><th>Product</th><th class="right">Qty</th><th class="right">Unit Price</th><th class="right">Subtotal</th></tr></thead>
                        <tbody>
                            ${items.map((item, i) => `<tr>
                                <td>${i + 1}</td>
                                <td class="product-name">${esc(item.product_name)}</td>
                                <td class="right">${item.quantity}</td>
                                <td class="right">€${Number(item.unit_price).toFixed(2)}</td>
                                <td class="right">€${(Number(item.unit_price) * item.quantity).toFixed(2)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="totals-section">
                        <div class="totals-box">
                            <div class="totals-row"><span>Subtotal</span><span>€${subtotal.toFixed(2)}</span></div>
                            ${shipping > 0 ? `<div class="totals-row"><span>Shipping</span><span>€${shipping.toFixed(2)}</span></div>` : ''}
                            <div class="totals-row grand"><span>Total</span><span>€${Number(order.total).toFixed(2)}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        async function cancelOrder(orderId) {
            if (!confirm('Are you sure you want to cancel this order? This cannot be undone.')) return;

            const btn = document.getElementById('cancelBtn');
            if (btn) { btn.disabled = true; btn.textContent = 'Cancelling...'; }

            const { error } = await db.rpc('cancel_consumer_order', { p_order_id: orderId });

            if (error) {
                const alertEl = document.getElementById('cancelAlert');
                if (alertEl) { alertEl.className = 'alert alert-error show'; alertEl.textContent = 'Could not cancel order: ' + error.message; }
                if (btn) { btn.disabled = false; btn.textContent = 'Cancel Order'; }
                return;
            }

            // Update local state and go back to list
            const order = allOrders.find(o => o.id === orderId);
            if (order) order.status = 'cancelled';
            renderOrderList();
        }

        async function retryPayment(orderId) {
            const btns = document.querySelectorAll(`[id^="paynow"][id$="${orderId}"]`);
            btns.forEach(b => { b.disabled = true; b.textContent = 'Redirecting...'; });
            try {
                const order = allOrders.find(o => o.id === orderId);
                const baseUrl = window.location.origin;
                const response = await fetch('/.netlify/functions/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        order_id: orderId,
                        customer_email: order.guest_email || currentUser.email,
                        success_url: baseUrl + '/consumer-success.html?order_id=' + orderId,
                        cancel_url: baseUrl + '/consumer-orders.html'
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                await db.from('orders').update({ stripe_session_id: data.session_id }).eq('id', orderId);
                window.location.href = data.url;
            } catch (err) {
                btns.forEach(b => { b.disabled = false; b.textContent = 'Complete Payment →'; });
                alert('Could not initiate payment: ' + err.message);
            }
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
        function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
        function fmtDate(d) { return new Date(d).toLocaleDateString('en-IE', { day: 'numeric', month: 'long', year: 'numeric' }); }
    </script>
</body>
</html>
