<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — DrMobilePhone</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .checkout-wrapper { max-width: 900px; margin: 0 auto; padding: 7rem 2rem 3rem; }
        .checkout-wrapper h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
        .checkout-wrapper .subtitle { font-size: 0.92rem; color: var(--gray-500); margin-bottom: 2rem; }

        .nav-cart { position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .cart-badge { position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; background: var(--orange); color: white; font-size: 0.68rem; font-weight: 700; border-radius: 100px; display: none; align-items: center; justify-content: center; padding: 0 4px; }

        .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; align-items: start; }

        /* Order summary */
        .order-summary { border: 1px solid var(--gray-200); border-radius: 16px; padding: 1.5rem; }
        .order-summary h2 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 1rem; }

        .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--gray-100); }
        .summary-item:last-of-type { border-bottom: none; }
        .summary-item-info { flex: 1; }
        .summary-item-info .name { font-size: 0.9rem; font-weight: 500; }
        .summary-item-info .qty { font-size: 0.8rem; color: var(--gray-500); }
        .summary-item-price { font-weight: 600; font-size: 0.9rem; white-space: nowrap; margin-left: 1rem; }

        .summary-total { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0 0; border-top: 2px solid var(--gray-200); margin-top: 0.5rem; }
        .summary-total .label { font-weight: 700; font-size: 1rem; }
        .summary-total .value { font-weight: 700; font-size: 1.3rem; }

        /* Payment section */
        .payment-section { border: 1px solid var(--gray-200); border-radius: 16px; padding: 1.5rem; }
        .payment-section h2 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 0.5rem; }
        .payment-section .info-text { font-size: 0.85rem; color: var(--gray-500); margin-bottom: 1.5rem; line-height: 1.5; }

        .payment-option { border: 1.5px solid var(--gray-200); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
        .payment-option:hover { border-color: var(--orange); }
        .payment-option.selected { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }
        .payment-option-header { display: flex; align-items: center; gap: 0.75rem; }
        .payment-option-header .radio { width: 20px; height: 20px; border: 2px solid var(--gray-300); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .payment-option.selected .radio { border-color: var(--orange); }
        .payment-option.selected .radio::after { content: ''; width: 10px; height: 10px; background: var(--orange); border-radius: 50%; }
        .payment-option-header .option-title { font-weight: 600; font-size: 0.95rem; }
        .payment-option-header .option-icon { margin-left: auto; font-size: 1.2rem; }
        .payment-option .option-desc { font-size: 0.82rem; color: var(--gray-500); margin-top: 0.4rem; padding-left: 2.75rem; line-height: 1.4; }

        .checkout-btn { width: 100%; margin-top: 0.5rem; }

        /* Notes field */
        .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; color: var(--black); background: white; outline: none; resize: vertical; min-height: 70px; transition: border-color 0.2s; }
        .form-group textarea:focus { border-color: var(--orange); }
        .form-group label { font-size: 0.82rem; font-weight: 500; color: var(--gray-700); margin-bottom: 0.4rem; display: block; }

        .processing-overlay { display: none; position: fixed; inset: 0; background: rgba(250,250,250,0.92); z-index: 500; justify-content: center; align-items: center; flex-direction: column; gap: 1rem; }
        .processing-overlay.show { display: flex; }
        .processing-overlay .spinner-lg { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-overlay p { font-size: 0.95rem; color: var(--gray-700); }

        @media (max-width: 768px) {
            .checkout-wrapper { padding: 6rem 1.25rem 2rem; }
            .checkout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/shop" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg>
            </div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks"></div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="processing-overlay" id="processingOverlay">
        <div class="spinner-lg"></div>
        <p id="processingText">Processing your order...</p>
    </div>

    <div class="checkout-wrapper">
        <h1>Checkout</h1>
        <p class="subtitle">Review your order and choose a payment method.</p>
        <div id="alert" class="alert"></div>

        <div class="checkout-grid" id="checkoutContent">
            <!-- Filled by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/cart.js"></script>
    <script>
        let cartItems = [];
        let profile = null;
        let selectedPayment = 'card'; // default
        let shipSettings = {};

        (async () => {
            const result = await requireAuth(['approved']);
            if (!result) return;
            profile = result.profile;
            renderNavForCheckout(profile);

            cartItems = await getCartItems();
            if (cartItems.length === 0) {
                window.location.href = '/cart.html';
                return;
            }

            const { data: shipRow } = await db.from('shop_settings').select('value').eq('key', 'shipping').single();
            if (shipRow) shipSettings = shipRow.value;

            renderCheckout();
        })();

        function calcShipping(subtotal) {
            let rate = shipSettings.standard_rate || 0;
            let label = 'Shipping';
            if (shipSettings.free_threshold > 0 && subtotal >= shipSettings.free_threshold) {
                rate = 0;
                label = 'Free Shipping';
            }
            return { rate, label };
        }

        function renderNavForCheckout(profile) {
            const navLinks = document.querySelector('.nav-links');
            if (!navLinks) return;
            let links = '<button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>';
            if (profile.is_admin) links += '<a href="/admin.html">Admin</a>';
            links += '<a href="/store.html">Store</a>';
            links += `<a href="/cart.html" class="nav-cart">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                Cart <span class="cart-badge">0</span></a>`;
            links += '<a href="/orders.html">Orders</a>';
            links += `<a href="#" onclick="signOut(); return false;" class="nav-cta">Sign Out</a>`;
            navLinks.innerHTML = links;
            ensureHamburger();
            updateCartBadge();
        }

        function renderCheckout() {
            const subtotal = calculateCartTotal(cartItems);
            const { rate: shipping, label: shippingLabel } = calcShipping(subtotal);
            const total = subtotal + shipping;
            const isCreditApproved = profile.credit_approved === true;

            let html = '';

            // Left: Payment section
            html += '<div class="payment-section-wrap">';
            html += '<div class="payment-section">';
            html += '<h2>Payment Method</h2>';

            if (isCreditApproved) {
                html += '<p class="info-text">Your account is approved for credit. You can pay by card or place the order on your trade account.</p>';
                html += `<div class="payment-option selected" id="opt-invoice" onclick="selectPayment('invoice')">
                    <div class="payment-option-header">
                        <div class="radio"></div>
                        <span class="option-title">Place on Account (Invoice)</span>
                        <span class="option-icon">📄</span>
                    </div>
                    <div class="option-desc">Order now, pay within 30 days. An invoice will be generated for your records.</div>
                </div>`;
                html += `<div class="payment-option" id="opt-card" onclick="selectPayment('card')">
                    <div class="payment-option-header">
                        <div class="radio"></div>
                        <span class="option-title">Pay by Card</span>
                        <span class="option-icon">💳</span>
                    </div>
                    <div class="option-desc">Secure payment via Stripe. Visa, Mastercard, and more.</div>
                </div>`;
                selectedPayment = 'invoice';
            } else {
                html += '<p class="info-text">Secure payment via Stripe. We accept Visa, Mastercard, and more.</p>';
                html += `<div class="payment-option selected" id="opt-card" onclick="selectPayment('card')">
                    <div class="payment-option-header">
                        <div class="radio"></div>
                        <span class="option-title">Pay by Card</span>
                        <span class="option-icon">💳</span>
                    </div>
                    <div class="option-desc">You'll be redirected to Stripe's secure checkout page.</div>
                </div>`;
                selectedPayment = 'card';
            }

            html += '</div>'; // .payment-section

            // Notes
            html += `<div class="payment-section" style="margin-top:1rem;">
                <div class="form-group">
                    <label for="orderNotes">Order Notes (optional)</label>
                    <textarea id="orderNotes" placeholder="Any special instructions or notes..."></textarea>
                </div>
            </div>`;

            html += `<div style="margin:1rem 0 0.75rem;">
                <label style="display:flex;align-items:flex-start;gap:0.6rem;font-size:0.85rem;color:var(--gray-700);cursor:pointer;line-height:1.4;">
                    <input type="checkbox" id="consentTerms" style="margin-top:0.2rem;accent-color:var(--orange);flex-shrink:0;width:16px;height:16px;">
                    I have read and agree to the <a href="/terms.html" target="_blank" style="color:var(--orange);">Terms &amp; Conditions</a> and <a href="/privacy-policy.html" target="_blank" style="color:var(--orange);">Privacy Policy</a>
                </label>
            </div>`;

            html += `<button class="btn btn-primary checkout-btn" id="checkoutBtn" onclick="placeOrder()">
                ${selectedPayment === 'invoice' ? 'Place Order on Account' : 'Pay with Card — €' + total.toFixed(2)}
            </button>`;

            html += '</div>'; // .payment-section-wrap

            // Right: Order summary
            html += '<div class="order-summary">';
            html += '<h2>Order Summary</h2>';
            cartItems.forEach(item => {
                const p = item.product;
                const price = (p.is_on_sale && p.sale_price) ? Number(p.sale_price) : Number(p.price);
                const lineTotal = price * item.quantity;
                html += `<div class="summary-item">
                    <div class="summary-item-info">
                        <div class="name">${esc(p.name)}</div>
                        <div class="qty">${item.quantity} × €${price.toFixed(2)}</div>
                    </div>
                    <div class="summary-item-price">€${lineTotal.toFixed(2)}</div>
                </div>`;
            });
            html += `<div style="padding:0.5rem 0;border-top:1px solid var(--gray-100);margin-top:0.25rem;">
                <div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:0.3rem;"><span>Subtotal</span><span>€${subtotal.toFixed(2)}</span></div>
                <div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:0.3rem;"><span>${shippingLabel}</span><span>${shipping === 0 ? 'FREE' : '€' + shipping.toFixed(2)}</span></div>
            </div>`;
            html += `<div class="summary-total">
                <span class="label">Total</span>
                <span class="value">€${total.toFixed(2)}</span>
            </div>`;
            html += '</div>';

            document.getElementById('checkoutContent').innerHTML = html;
        }

        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
            document.getElementById('opt-' + method).classList.add('selected');
            const subtotal = calculateCartTotal(cartItems);
            const { rate: shipping } = calcShipping(subtotal);
            const total = subtotal + shipping;
            const btn = document.getElementById('checkoutBtn');
            btn.textContent = method === 'invoice'
                ? 'Place Order on Account'
                : 'Pay with Card — €' + total.toFixed(2);
        }

        async function placeOrder() {
            if (!document.getElementById('consentTerms').checked) {
                showAlert('alert', 'You must accept the Terms & Conditions and Privacy Policy to place an order.', 'error');
                return;
            }

            const btn = document.getElementById('checkoutBtn');
            btn.disabled = true;
            showProcessing('Processing your order...');

            try {
                const user = await getCurrentUser();
                const subtotal = calculateCartTotal(cartItems);
                const { rate: shipping, label: shippingLabel } = calcShipping(subtotal);
                const total = subtotal + shipping;
                const notes = document.getElementById('orderNotes')?.value?.trim() || '';

                // 1. Create order in database
                const { data: order, error: orderError } = await db
                    .from('orders')
                    .insert({
                        user_id: user.id,
                        status: selectedPayment === 'invoice' ? 'invoiced' : 'pending',
                        payment_method: selectedPayment,
                        subtotal: subtotal,
                        total: total,
                        notes: notes
                    })
                    .select()
                    .single();

                if (orderError) throw new Error('Failed to create order: ' + orderError.message);

                // 2. Create order items
                const orderItems = cartItems.map(item => {
                    const p = item.product;
                    const price = (p.is_on_sale && p.sale_price) ? Number(p.sale_price) : Number(p.price);
                    return {
                        order_id: order.id,
                        product_id: p.id,
                        product_name: p.name,
                        quantity: item.quantity,
                        unit_price: price
                    };
                });

                const { error: itemsError } = await db
                    .from('order_items')
                    .insert(orderItems);

                if (itemsError) throw new Error('Failed to save order items: ' + itemsError.message);

                // 3. Reserve stock for each item
                for (const item of cartItems) {
                    await db.rpc('deduct_stock', { p_product_id: item.product.id, p_quantity: item.quantity });
                }

                // 4. Route based on payment method
                if (selectedPayment === 'card') {
                    await handleCardPayment(order, user, shipping, shippingLabel);
                } else {
                    await handleInvoiceOrder(order, user, total);
                }

            } catch (err) {
                hideProcessing();
                showAlert('alert', err.message, 'error');
                btn.disabled = false;
            }
        }

        async function handleCardPayment(order, user, shipping, shippingLabel) {
            showProcessing('Redirecting to Stripe...');

            const baseUrl = window.location.origin;

            const response = await fetch('/.netlify/functions/create-checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    order_id: order.id,
                    customer_email: profile.email,
                    success_url: `${baseUrl}/order-success.html?order_id=${order.id}&session_id={CHECKOUT_SESSION_ID}`,
                    cancel_url: `${baseUrl}/checkout.html`
                })
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error);

            // Save stripe session ID to order
            await db.from('orders')
                .update({ stripe_session_id: data.session_id })
                .eq('id', order.id);

            // Redirect to Stripe
            window.location.href = data.url;
        }

        async function handleInvoiceOrder(order, user, total) {
            showProcessing('Generating invoice...');

            // Generate invoice number
            const { data: invNum } = await db.rpc('next_invoice_number');
            const invoiceNumber = invNum || ('INV-' + Date.now());

            // Calculate due date (30 days from now)
            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 30);
            const dueDateStr = dueDate.toISOString().split('T')[0];

            // Create invoice
            const { error: invError } = await db
                .from('invoices')
                .insert({
                    order_id: order.id,
                    user_id: user.id,
                    invoice_number: invoiceNumber,
                    amount: total,
                    due_date: dueDateStr,
                    status: 'sent'
                });

            if (invError) throw new Error('Failed to create invoice: ' + invError.message);

            // Clear cart
            await clearCart();

            // Redirect to success
            window.location.href = `/order-success.html?order_id=${order.id}&method=invoice`;
        }

        function showProcessing(text) {
            document.getElementById('processingText').textContent = text;
            document.getElementById('processingOverlay').classList.add('show');
        }

        function hideProcessing() {
            document.getElementById('processingOverlay').classList.remove('show');
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
    </script>
</body>
</html>
