<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-wrap { max-width: 600px; margin: 0 auto; padding: 8rem 2rem 3rem; text-align: center; }
        .success-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--green-dim); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; }
        .success-wrap h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 0.5rem; }
        .success-wrap p { font-size: 0.95rem; color: var(--gray-500); margin-bottom: 2rem; line-height: 1.6; }
        .success-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .success-actions .btn { width: auto; }
        @media (max-width: 768px) { .success-wrap { padding: 6rem 1.25rem 2rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg></div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links" id="navLinks">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/">Shop</a>
            <a href="/wholesale.html">Wholesale</a>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="success-wrap">
        <div class="success-icon">✓</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your order. You will receive a confirmation email shortly. We will process and ship your order as soon as possible.</p>
        <div class="success-actions">
            <a href="/" class="btn btn-primary">Continue Shopping</a>
        </div>
    </div>

    <script>
        // Clear any remaining cart data
        localStorage.removeItem('consumer_cart');
        localStorage.removeItem('consumer_cart_backup');

        function toggleMobileMenu() { document.querySelector('.nav-links')?.classList.toggle('open'); }
        document.addEventListener('click', e => { if (e.target.closest('.nav-links a')) document.querySelector('.nav-links')?.classList.remove('open'); });
    </script>
</body>
</html>
