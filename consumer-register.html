<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — DrMobilePhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="white"/><circle cx="12" cy="18" r="1" fill="#E8611A"/></svg>
            </div>
            <div class="logo-text">DrMobile<span>Phone</span></div>
        </a>
        <div class="nav-links">
            <button class="nav-close" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <a href="/">Shop</a>
            <a href="/consumer-login.html" class="nav-cta">Sign In</a>
        </div>
        <button class="hamburger" onclick="toggleMobileMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Create an account</h1>
            <p class="subtitle">Free to join. Complete your order in seconds.</p>

            <div id="alert" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="full_name">Full Name *</label>
                    <input type="text" id="full_name" placeholder="Your full name" required autofocus>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+353 ...">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="password_confirm">Confirm Password *</label>
                        <input type="password" id="password_confirm" placeholder="Repeat password" required minlength="8">
                    </div>
                </div>
                <div style="margin-bottom:0.75rem;">
                    <label style="display:flex;align-items:flex-start;gap:0.6rem;font-size:0.85rem;color:var(--gray-700);cursor:pointer;line-height:1.4;">
                        <input type="checkbox" id="consentTerms" required style="margin-top:0.2rem;accent-color:var(--orange);flex-shrink:0;width:16px;height:16px;">
                        I have read and agree to the <a href="/terms.html" target="_blank" style="color:var(--orange);">Terms &amp; Conditions</a> *
                    </label>
                </div>
                <div style="margin-bottom:1.25rem;">
                    <label style="display:flex;align-items:flex-start;gap:0.6rem;font-size:0.85rem;color:var(--gray-700);cursor:pointer;line-height:1.4;">
                        <input type="checkbox" id="consentPrivacy" required style="margin-top:0.2rem;accent-color:var(--orange);flex-shrink:0;width:16px;height:16px;">
                        I have read and agree to the <a href="/privacy-policy.html" target="_blank" style="color:var(--orange);">Privacy Policy</a> *
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Create Account &amp; Continue</button>
            </form>

            <div class="divider"></div>

            <p class="footer-text">
                Already have an account? <a href="" id="loginLink">Sign in</a>
            </p>
            <p class="footer-text" style="margin-top:0.5rem;font-size:0.8rem;">
                Business customer? <a href="/register.html">Open a trade account</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://btzbifpqtzgpyvlyipxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0emJpZnBxdHpncHl2bHlpcHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTM0ODMsImV4cCI6MjA4NzUyOTQ4M30.oIdVuiKlstdYUi6bSjev61wGNr4hbL5rIWtwIwT_R-s';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function toggleMobileMenu() { document.querySelector('.nav-links')?.classList.toggle('open'); }

        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return') || '/consumer-checkout.html';

        // Set login link to preserve return param
        document.getElementById('loginLink').href = '/consumer-login.html' + (params.get('return') ? '?return=' + encodeURIComponent(params.get('return')) : '');

        // If already logged in, redirect
        (async () => {
            const { data: { session } } = await db.auth.getSession();
            if (session) window.location.href = returnUrl;
        })();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            alertEl.className = 'alert';

            const fullName = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;

            if (!fullName || !email || !password) {
                alertEl.className = 'alert alert-error show';
                alertEl.textContent = 'Please fill in all required fields.';
                return;
            }
            if (!document.getElementById('consentTerms').checked || !document.getElementById('consentPrivacy').checked) {
                alertEl.className = 'alert alert-error show';
                alertEl.textContent = 'You must accept the Terms & Conditions and Privacy Policy to create an account.';
                return;
            }
            if (password.length < 8) {
                alertEl.className = 'alert alert-error show';
                alertEl.textContent = 'Password must be at least 8 characters.';
                return;
            }
            if (password !== passwordConfirm) {
                alertEl.className = 'alert alert-error show';
                alertEl.textContent = 'Passwords do not match.';
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            const { data, error } = await db.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: fullName,
                        phone: phone,
                        user_type: 'consumer'
                    }
                }
            });

            if (error) {
                alertEl.className = 'alert alert-error show';
                alertEl.textContent = error.message;
                btn.disabled = false;
                btn.textContent = 'Create Account & Continue';
                return;
            }

            // If session is immediately available (email confirmation disabled), redirect
            if (data.session) {
                window.location.href = returnUrl;
                return;
            }

            // Email confirmation required — tell user to check inbox
            alertEl.className = 'alert alert-success show';
            alertEl.textContent = 'Account created! Please check your email to confirm your address, then sign in.';
            btn.disabled = false;
            btn.textContent = 'Create Account & Continue';

            // Redirect to login after 3 seconds
            setTimeout(() => {
                window.location.href = '/consumer-login.html' + (params.get('return') ? '?return=' + encodeURIComponent(params.get('return')) : '');
            }, 3000);
        });
    </script>
</body>
</html>
